name: practica3_gestor_archivos
description: Gestor de archivos multiplataforma - Práctica 3 ESCOM IPN
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Gestor de estado
  provider: ^6.1.2

  # Acceso al sistema de archivos
  path_provider: ^2.1.3

  # Abrir archivos con app externa
  open_file: ^3.3.2

  # Almacenamiento local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permisos
  permission_handler: ^11.3.1

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.4.0
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
